<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Kanban Multiverso v4 — Vilarejo de Lince</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#DAA520;--gold-glow:#DAA52060;--dark:#0a0500;--panel:#0a0500e0;--border:#6B422660;--text:#AB8B6A;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--purple:#8b5cf6}
body{background:var(--dark);overflow:hidden;font-family:'Press Start 2P',monospace;color:#e2e8f0;user-select:none}
#app{width:100vw;height:100vh;display:flex;flex-direction:column}

/* HUD */
#hud{height:42px;background:var(--panel);border-bottom:2px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:10px;z-index:50;backdrop-filter:blur(8px)}
.hud-logo{font-size:8px;color:var(--gold);text-shadow:0 0 10px var(--gold-glow);letter-spacing:1px}
.hud-sep{width:1px;height:18px;background:var(--border)}
.hs{text-align:center;min-width:44px}
.hs .l{font-size:4px;color:#6B4226;text-transform:uppercase;letter-spacing:.5px}
.hs .v{font-size:8px;color:var(--gold);text-shadow:0 0 6px var(--gold-glow)}
.hs .v.g{color:var(--green)}.hs .v.a{color:var(--amber)}.hs .v.p{color:var(--purple)}
.spacer{flex:1}

/* XP BAR */
#xp-bar-wrap{width:120px;height:10px;background:#1a0f00;border:1px solid var(--border);border-radius:5px;overflow:hidden;position:relative;cursor:pointer}
#xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--amber));border-radius:5px;transition:width .5s ease;width:0%}
#xp-bar-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:4px;color:#fff;text-shadow:0 0 4px #000}

/* NAV */
.nav{display:flex;gap:1px}
.nav button{background:none;border:1px solid transparent;border-radius:3px;padding:3px 8px;font-family:inherit;font-size:5px;color:var(--text);cursor:pointer;transition:all .15s}
.nav button:hover,.nav button.on{background:#DAA52015;border-color:#DAA52040;color:var(--gold)}

/* VIEWPORT */
#vp{flex:1;position:relative;overflow:hidden}

/* SCENES */
.scene{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity .5s,transform .5s;display:flex;flex-direction:column}
.scene.out{opacity:0;transform:scale(1.05);pointer-events:none}
.fog{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 120%,#0a050080 0%,transparent 70%);pointer-events:none;z-index:2}
.vig{position:absolute;inset:0;box-shadow:inset 0 0 150px 50px #0a050090;pointer-events:none;z-index:3}

/* PARTICLES */
.pts{position:absolute;inset:0;pointer-events:none;z-index:4;overflow:hidden}
.pt{position:absolute;border-radius:50%;opacity:0;animation:ptUp var(--dur,5s) var(--del,0s) infinite}
@keyframes ptUp{0%{opacity:0;transform:translateY(100vh) scale(.5)}15%{opacity:.7}85%{opacity:.3}100%{opacity:0;transform:translateY(-20px) scale(.1)}}

/* FIREFLIES */
.ff{position:absolute;width:4px;height:4px;background:var(--gold);border-radius:50%;box-shadow:0 0 6px var(--gold),0 0 12px var(--gold-glow);animation:ffFloat var(--dur,4s) var(--del,0s) infinite ease-in-out}
@keyframes ffFloat{0%,100%{transform:translate(0,0);opacity:.3}25%{transform:translate(10px,-15px);opacity:.9}50%{transform:translate(-5px,-25px);opacity:.6}75%{transform:translate(15px,-10px);opacity:.8}}

/* LOCATION LABELS */
.loc{position:absolute;text-align:center;cursor:pointer;transition:all .3s;z-index:10;transform:translate(-50%,-50%)}
.loc .nm{font-size:6px;color:var(--gold);text-shadow:0 0 8px var(--gold-glow),0 2px 4px #000;background:#0a0500c0;padding:3px 10px;border-radius:4px;border:1px solid #DAA52030;backdrop-filter:blur(4px);transition:all .2s;position:relative}
.loc .sb{font-size:4px;color:var(--text);margin-top:2px;opacity:.7}
.loc:hover .nm{background:#DAA52025;border-color:var(--gold);box-shadow:0 0 24px var(--gold-glow);transform:scale(1.05)}
.loc .hint{font-size:4px;color:var(--green);opacity:0;transition:opacity .2s;margin-top:2px}
.loc:hover .hint{opacity:1}
.loc .badge{position:absolute;top:-10px;right:-10px;min-width:16px;height:16px;background:var(--red);border:2px solid var(--dark);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;color:#fff;animation:badgePulse 2s infinite}
@keyframes badgePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.loc .quest-glow{position:absolute;inset:-20px;border-radius:50%;background:radial-gradient(circle,var(--gold-glow) 0%,transparent 70%);animation:questGlow 3s infinite;pointer-events:none}
@keyframes questGlow{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:.5;transform:scale(1.1)}}

/* ROOM */
#room{position:absolute;inset:0;z-index:20;display:none;flex-direction:column}
#room.open{display:flex}
#room-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity .5s}
#room-dim{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,transparent 20%,#0a050060 100%);pointer-events:none}
#room-vig{position:absolute;inset:0;box-shadow:inset 0 0 200px 60px #0a0500a0;pointer-events:none}

/* ROOM HEADER */
.rh{position:relative;z-index:5;padding:16px 20px 0;display:flex;justify-content:space-between;align-items:flex-start}
.rh-title{font-size:12px;color:var(--gold);text-shadow:0 0 16px var(--gold-glow),0 2px 6px #000;letter-spacing:2px}
.rh-sub{font-size:6px;color:var(--text);margin-top:4px;text-shadow:0 1px 3px #000;max-width:500px;line-height:1.6}
.rh-close{background:#0a0500a0;border:1px solid #6B4226;border-radius:5px;padding:5px 12px;font-family:inherit;font-size:6px;color:var(--text);cursor:pointer;backdrop-filter:blur(8px);transition:all .2s}
.rh-close:hover{background:#ef444440;border-color:var(--red);color:var(--red)}

/* ROOM STATS */
.room-stats{position:relative;z-index:5;display:flex;gap:8px;padding:8px 20px;flex-wrap:wrap}
.rs-card{background:#0a0500a0;border:1px solid var(--border);border-radius:6px;padding:6px 12px;backdrop-filter:blur(8px);text-align:center;min-width:80px}
.rs-card .rs-v{font-size:12px;margin-bottom:2px}
.rs-card .rs-l{font-size:4px;color:var(--text)}

/* QUEST CARDS */
#room-q{position:relative;z-index:5;flex:1;padding:10px 20px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start}
.qc{width:230px;background:#0a0500b0;border:1px solid #DAA52020;border-radius:6px;padding:10px 12px;backdrop-filter:blur(10px);transition:all .25s;cursor:default;position:relative;overflow:hidden}
.qc::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--gold)}
.qc:hover{border-color:#DAA52050;transform:translateY(-2px);box-shadow:0 8px 24px #0005}
.qc.urgent::before{background:var(--red)}.qc.high::before{background:var(--amber)}.qc.medium::before{background:#eab308}
.qc-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.qc-name{font-size:7px;color:var(--gold);text-shadow:0 0 6px var(--gold-glow)}
.qc-pri{font-size:5px;padding:2px 5px;border-radius:3px;border:1px solid}
.qc-pri.urgent{background:#ef444420;color:var(--red);border-color:#ef444430}
.qc-pri.high{background:#f9731620;color:var(--amber);border-color:#f9731630}
.qc-pri.medium{background:#eab30820;color:#eab308;border-color:#eab30830}
.qc-info{font-size:5px;color:var(--text);margin-bottom:3px;display:flex;gap:6px;align-items:center}
.qc-val{color:var(--green);font-size:6px}
.qc-days{font-size:4px;margin-bottom:5px}
.qc-days.risk{color:var(--red);animation:pulse 1.5s infinite}
.qc-days.warn{color:var(--amber)}
.qc-days.ok{color:#64748b}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.qc-adv{width:100%;background:#DAA52008;border:1px solid #DAA52030;border-radius:4px;padding:5px;font-family:inherit;font-size:5px;color:var(--gold);cursor:pointer;text-align:center;transition:all .2s;margin-top:4px}
.qc-adv:hover{background:#DAA52020;box-shadow:0 0 16px var(--gold-glow)}
.qc-done{text-align:center;font-size:5px;color:var(--green);padding:5px;margin-top:4px}

/* CHECKLIST (sub-quests in room) */
.qc-checks{margin-top:5px;border-top:1px solid #6B422630;padding-top:5px}
.qc-ck{display:flex;align-items:center;gap:4px;font-size:4px;color:var(--text);padding:2px 0;cursor:pointer;transition:color .2s}
.qc-ck:hover{color:var(--gold)}
.qc-ck.done{color:#22c55e80;text-decoration:line-through}
.qc-ck .box{width:10px;height:10px;border:1px solid var(--border);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:6px;flex-shrink:0}
.qc-ck.done .box{background:var(--green);border-color:var(--green);color:#fff}

/* XP POPUP */
.xp-pop{position:fixed;z-index:200;font-size:10px;color:var(--gold);text-shadow:0 0 12px var(--gold-glow);pointer-events:none;animation:xpFloat 1.5s ease-out forwards}
@keyframes xpFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}

/* LEVEL UP */
#levelup{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;background:#0a050090;backdrop-filter:blur(4px)}
#levelup.show{display:flex}
#levelup-box{text-align:center;animation:lvlBounce .6s ease}
@keyframes lvlBounce{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
#levelup-box .lvl-icon{font-size:48px;margin-bottom:8px}
#levelup-box .lvl-text{font-size:12px;color:var(--gold);text-shadow:0 0 20px var(--gold-glow);margin-bottom:4px}
#levelup-box .lvl-sub{font-size:6px;color:var(--text)}

/* ACHIEVEMENT TOAST */
.ach-toast{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:250;background:var(--panel);border:2px solid var(--gold);border-radius:8px;padding:10px 20px;backdrop-filter:blur(12px);display:flex;align-items:center;gap:10px;animation:achSlide .5s ease,achSlide .5s ease 3s reverse forwards}
@keyframes achSlide{from{opacity:0;transform:translateX(-50%) translateY(30px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ach-toast .ach-icon{font-size:24px}
.ach-toast .ach-text{font-size:7px;color:var(--gold)}
.ach-toast .ach-desc{font-size:5px;color:var(--text);margin-top:2px}

/* NOTIFICATION */
#notif{position:fixed;top:42px;left:0;right:0;z-index:100;padding:6px 16px;text-align:center;font-size:6px;color:var(--gold);background:linear-gradient(90deg,#0a0500f0,#1a0f00f0,#0a0500f0);border-bottom:1px solid #DAA52030;transform:translateY(-100%);transition:transform .3s;text-shadow:0 0 10px var(--gold-glow)}
#notif.show{transform:translateY(0)}

/* BOTTOM */
#bot{height:28px;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;z-index:50}
#bot .chat{font-size:4px;color:var(--green);flex:1}
#bot .ctrls{font-size:4px;color:#6B4226;display:flex;gap:6px}
.key{background:#1a0f00;border:1px solid var(--border);border-radius:2px;padding:1px 4px;font-size:5px;color:var(--text)}

/* HERO PANEL (right side) */
#hero-panel{position:absolute;top:0;right:0;width:180px;height:100%;background:linear-gradient(180deg,#0a0500e8,#1a0f00e8);border-left:2px solid var(--border);z-index:15;padding:8px;overflow-y:auto;backdrop-filter:blur(8px);transform:translateX(100%);transition:transform .3s}
#hero-panel.open{transform:translateX(0)}
.hp-title{font-size:6px;color:var(--gold);margin-bottom:8px;text-align:center}
.hero-card{background:#1a0f0060;border:1px solid var(--border);border-radius:5px;padding:6px;margin-bottom:4px;display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .2s}
.hero-card:hover{border-color:var(--gold);background:#DAA52010}
.hero-card .hc-icon{font-size:16px}
.hero-card .hc-name{font-size:5px;color:#e2e8f0}
.hero-card .hc-class{font-size:4px;color:var(--text)}
.hero-card .hc-lv{font-size:5px;color:var(--gold);margin-left:auto}
.hero-btn{position:absolute;top:50%;right:0;transform:translateY(-50%);z-index:16;background:var(--panel);border:1px solid var(--border);border-radius:4px 0 0 4px;padding:8px 4px;cursor:pointer;font-size:8px;transition:all .2s}
.hero-btn:hover{background:#DAA52020;border-color:var(--gold)}

/* LOADING */
#load{position:fixed;inset:0;z-index:500;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1s}
#load.done{opacity:0;pointer-events:none}
#load .t{font-size:11px;color:var(--gold);text-shadow:0 0 20px var(--gold-glow);margin-bottom:6px;letter-spacing:3px}
#load .s{font-size:5px;color:var(--text);margin-bottom:16px}
#load .bar{width:180px;height:5px;background:#1a0f00;border:1px solid #6B4226;border-radius:3px;overflow:hidden}
#load .fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--amber));border-radius:3px;transition:width .2s;width:0%}
#load .tip{font-size:4px;color:#6B4226;margin-top:10px;max-width:240px;text-align:center;line-height:1.6}
</style>
</head>
<body>

<div id="load">
  <div class="t">⚔️ KANBAN MULTIVERSO</div>
  <div class="s">Vilarejo de Lince — Carregando...</div>
  <div class="bar"><div class="fill" id="load-fill"></div></div>
  <div class="tip" id="load-tip">Preparando o vilarejo...</div>
</div>

<div id="notif"></div>
<div id="levelup"><div id="levelup-box"><div class="lvl-icon">⚔️</div><div class="lvl-text" id="lvl-text">NÍVEL 2!</div><div class="lvl-sub" id="lvl-sub">Continue completando missões!</div></div></div>

<div id="app">
  <div id="hud">
    <div class="hud-logo">⚔️ MULTIVERSO</div>
    <div class="hud-sep"></div>
    <div id="xp-bar-wrap" title="XP da Guilda">
      <div id="xp-bar-fill"></div>
      <div id="xp-bar-text">Lv 1 — 0 XP</div>
    </div>
    <div class="hud-sep"></div>
    <div class="hs"><div class="l">Missões</div><div class="v a" id="h-act">0</div></div>
    <div class="hs"><div class="l">Completas</div><div class="v g" id="h-done">0</div></div>
    <div class="hs"><div class="l">Em Risco</div><div class="v" style="color:var(--red)" id="h-risk">0</div></div>
    <div class="hs"><div class="l">Ouro</div><div class="v g" id="h-gold">0</div></div>
    <div class="spacer"></div>
    <div class="nav" id="nav"></div>
  </div>

  <div id="vp">
    <div class="scene" id="hub" style="background:linear-gradient(180deg,#0a0a2a,#1a1030,#1a0f00)">
      <div class="fog"></div>
      <div class="vig"></div>
      <div class="pts" id="hub-pts"></div>
      <div id="hub-ffs"></div>
      <div id="hub-locs"></div>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1;pointer-events:none">
        <div style="text-align:center;opacity:.08">
          <div style="font-size:60px">🏰</div>
          <div style="font-size:8px;color:var(--gold);margin-top:8px">VILAREJO DE LINCE</div>
        </div>
      </div>
    </div>

    <div id="room">
      <div id="room-bg"></div>
      <div id="room-dim" style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,transparent 20%,#0a050060 100%);pointer-events:none"></div>
      <div style="position:absolute;inset:0;box-shadow:inset 0 0 200px 60px #0a0500a0;pointer-events:none"></div>
      <div class="pts" id="room-pts"></div>
      <div class="rh">
        <div>
          <div class="rh-title" id="r-title"></div>
          <div class="rh-sub" id="r-sub"></div>
        </div>
        <button class="rh-close" onclick="exitRoom()">← VILAREJO</button>
      </div>
      <div class="room-stats" id="r-stats"></div>
      <div id="room-q"></div>
    </div>

    <div class="hero-btn" id="hero-toggle" onclick="toggleHeroes()">👥</div>
    <div id="hero-panel">
      <div class="hp-title">⚔️ HERÓIS DA GUILDA</div>
      <div id="hero-list"></div>
    </div>
  </div>

  <div id="bot">
    <div class="chat" id="sys">⚔️ Bem-vindo ao Vilarejo de Lince!</div>
    <div class="ctrls">
      <span class="key">CLICK</span> entrar
      <span class="key">ESC</span> voltar
      <span class="key">H</span> heróis
    </div>
  </div>
</div>

<script>
// ═══ IMAGES — substitua pelas URLs reais ═══
var IMG={hub:'',venda_fechada:'',cs_inicial:'',cobranca_enviada:'',pagamento_confirmado:'',onboarding_agendado:'',onboarding_concluido:'',alinhamento_visual:'',servico_avulso:'',setup_trafego:'',trafego_ativo:'',producao_andamento:'',buscando_aprovacao:'',aprovacao_concluida:'',concluido:''};

// ═══ LOCATIONS ═══
var LOCS=[
  {id:'venda_fechada',nm:'TAVERNA',sub:'Venda Fechada',x:72,y:30,icon:'🏰',title:'TAVERNA DO AVENTUREIRO',desc:'Nova Missão — Um viajante chegou com um pedido de ajuda!'},

  {id:'pagamento_confirmado',nm:'MERCADO',sub:'Pagamento',x:82,y:62,icon:'🏪',title:'MERCADO GERAL',desc:'Ouro Recebido — Pagamento confirmado na tenda!'},

  {id:'alinhamento_visual',nm:'ARTESÃO',sub:'Visual',x:62,y:70,icon:'🎨',title:'TENDA DO ARTESÃO',desc:'Visão do Artesão — Definir paleta e identidade.'},
  {id:'servico_avulso',nm:'CABANA',sub:'Avulso',x:90,y:42,icon:'🎯',title:'CABANA DO CAÇADOR',desc:'Missão Especial — Serviço avulso ou sem tráfego.'},

  {id:'trafego_ativo',nm:'BATALHA',sub:'Tráfego',x:8,y:32,icon:'🚀',title:'CAMPO DE BATALHA',desc:'Batalha Ativa — Campanhas rodando!'},

  {id:'buscando_aprovacao',nm:'CORREIO',sub:'Aprovação',x:68,y:50,icon:'📤',title:'CORREIO REAL',desc:'Enviar ao Rei — Criativos prontos para aprovação.'},
  {id:'aprovacao_concluida',nm:'TRONO',sub:'Aprovado',x:50,y:12,icon:'👑',title:'TRONO DO REI',desc:'Decreto Real — O Rei aprovou!'},

];

// ═══ HEROES ═══
var HEROES=[
  {id:'u1',nm:'Thomas',cls:'Lorde Supremo',icon:'👑',role:'director'},

// ═══ SOUND (Web Audio API — synthesized, no files needed) ═══
var audioCtx;
function playSound(type){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  g.gain.value=0.08;
  if(type==='click'){o.frequency.value=800;o.type='sine';g.gain.setValueAtTime(.08,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.15);o.start();o.stop(audioCtx.currentTime+.15);}
  if(type==='advance'){o.frequency.value=523;o.type='sine';g.gain.setValueAtTime(.1,audioCtx.currentTime);o.start();setTimeout(function(){o.frequency.value=659;},100);setTimeout(function(){o.frequency.value=784;},200);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.4);o.stop(audioCtx.currentTime+.4);}
  if(type==='levelup'){o.frequency.value=440;o.type='square';g.gain.setValueAtTime(.06,audioCtx.currentTime);o.start();[554,659,880].forEach(function(f,i){setTimeout(function(){o.frequency.value=f;},i*150+150);});g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.8);o.stop(audioCtx.currentTime+.8);}
  if(type==='complete'){o.frequency.value=523;o.type='triangle';g.gain.setValueAtTime(.08,audioCtx.currentTime);o.start();[659,784,1047].forEach(function(f,i){setTimeout(function(){o.frequency.value=f;},i*120+120);});g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.6);o.stop(audioCtx.currentTime+.6);}
}

// ═══ INIT ═══
function init(){
  mkParticles('hub-pts',25);mkFireflies('hub-ffs',15);
  renderHub();renderNav();renderHeroes();updHUD();
  var bar=document.getElementById('load-fill'),pct=0;
  var tips=['Acendendo as tochas do vilarejo...','Convocando os heróis...','Preparando as missões...','Abrindo os portões...'];
  var ti=0;
  var iv=setInterval(function(){
    pct+=Math.random()*18+8;
    if(pct>50&&ti<tips.length){document.getElementById('load-tip').textContent=tips[ti];ti++;}
    if(pct>=100){pct=100;clearInterval(iv);setTimeout(function(){document.getElementById('load').classList.add('done');},500);}
    bar.style.width=pct+'%';
  },250);
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape')exitRoom();
    if(e.key==='h'||e.key==='H')toggleHeroes();
  });
}

// ═══ PARTICLES & FIREFLIES ═══
function mkParticles(id,n){var c=document.getElementById(id);for(var i=0;i<n;i++){var p=document.createElement('div');p.className='pt';p.style.left=Math.random()*100+'%';p.style.setProperty('--del',Math.random()*6+'s');p.style.setProperty('--dur',(4+Math.random()*5)+'s');var cs=['#DAA520','#f59e0b','#ef4444','#22c55e'];p.style.background=cs[i%cs.length];p.style.width=(2+Math.random()*2)+'px';p.style.height=p.style.width;c.appendChild(p);}}
function mkFireflies(id,n){var c=document.getElementById(id);for(var i=0;i<n;i++){var f=document.createElement('div');f.className='ff';f.style.left=Math.random()*90+5+'%';f.style.top=Math.random()*80+10+'%';f.style.setProperty('--del',Math.random()*4+'s');f.style.setProperty('--dur',(3+Math.random()*4)+'s');c.appendChild(f);}}

// ═══ HUB ═══
function renderHub(){
  var c=document.getElementById('hub-locs');c.innerHTML='';
  LOCS.forEach(function(loc){
    var qc=clients.filter(function(x){return x.st===loc.id;}).length;
    var d=document.createElement('div');d.className='loc';d.style.left=loc.x+'%';d.style.top=loc.y+'%';
    d.innerHTML=(qc>0?'<div class="quest-glow"></div><div class="badge">'+qc+'</div>':'')+
      '<div class="nm">'+loc.icon+' '+loc.nm+'</div>'+
      '<div class="sb">'+loc.sub+(qc>0?' • '+qc+' missão'+(qc>1?'es':''):'')+'</div>'+
      '<div class="hint">▶ ENTRAR</div>';
    d.onclick=function(){playSound('click');enterRoom(loc.id);};
    c.appendChild(d);
  });
}

// ═══ NAV ═══
function renderNav(){
  var n=document.getElementById('nav');n.innerHTML='';
  [{id:'_hub',l:'🏘️'},{id:'venda_fechada',l:'🏰'},{id:'cs_inicial',l:'⚔️'},{id:'setup_trafego',l:'⚡'},{id:'trafego_ativo',l:'🚀'},{id:'producao_andamento',l:'🔨'},{id:'buscando_aprovacao',l:'📤'},{id:'concluido',l:'🏆'}].forEach(function(t){
    var b=document.createElement('button');b.textContent=t.l;
    b.className=(!curRoom&&t.id==='_hub')||curRoom===t.id?'on':'';
    b.onclick=function(){playSound('click');t.id==='_hub'?exitRoom():enterRoom(t.id);};
    n.appendChild(b);
  });
}

// ═══ HUD ═══
function updHUD(){
  var act=clients.filter(function(c){return c.st!=='concluido';}).length;
  var don=clients.filter(function(c){return c.st==='concluido';}).length;
  var risk=clients.filter(function(c){return c.days>=5&&c.st!=='concluido';}).length;
  var gold=clients.reduce(function(s,c){return s+c.val;},0);
  document.getElementById('h-act').textContent=act;
  document.getElementById('h-done').textContent=don;
  document.getElementById('h-risk').textContent=risk;
  document.getElementById('h-gold').textContent='R$'+gold.toLocaleString('pt-BR');
  var xpForNext=guildLv*500;
  var pct=Math.min((guildXP%xpForNext)/xpForNext*100,100);
  document.getElementById('xp-bar-fill').style.width=pct+'%';
  document.getElementById('xp-bar-text').textContent='Lv '+guildLv+' — '+guildXP+' XP';
}

// ═══ HEROES ═══
function renderHeroes(){
  var c=document.getElementById('hero-list');c.innerHTML='';
  HEROES.sort(function(a,b){return(heroXP[b.id]||0)-(heroXP[a.id]||0);}).forEach(function(h,i){
    var lv=Math.floor((heroXP[h.id]||0)/250)+1;
    var d=document.createElement('div');d.className='hero-card';
    d.innerHTML='<div class="hc-icon">'+h.icon+'</div><div><div class="hc-name">'+(i<3?['👑','🥈','🥉'][i]+' ':'')+h.nm+'</div><div class="hc-class">'+h.cls+'</div></div><div class="hc-lv">Lv'+lv+'</div>';
    c.appendChild(d);
  });
}
function toggleHeroes(){heroPanel=!heroPanel;document.getElementById('hero-panel').classList.toggle('open',heroPanel);}

// ═══ ENTER ROOM ═══
function enterRoom(id){
  curRoom=id;
  var loc=LOCS.find(function(l){return l.id===id;});
  if(!loc)return;
  var bg=document.getElementById('room-bg');
  bg.style.background=IMG[id]?'url('+IMG[id]+') center/cover':FBG[id]||FBG.hub;
  document.getElementById('r-title').textContent=loc.title;
  document.getElementById('r-sub').textContent=loc.desc;

  var rc=clients.filter(function(c){return c.st===id;});

  // Room stats
  var rs=document.getElementById('r-stats');rs.innerHTML='';
  var totalVal=rc.reduce(function(s,c){return s+c.val;},0);
  var riskCount=rc.filter(function(c){return c.days>=5;}).length;
  [{v:rc.length,l:'Missões',e:'📜'},{v:'R$'+totalVal.toLocaleString('pt-BR'),l:'Valor Total',e:'🪙'},{v:riskCount,l:'Em Risco',e:'⚠️'}].forEach(function(s){
    var d=document.createElement('div');d.className='rs-card';
    d.innerHTML='<div class="rs-v">'+s.e+' '+s.v+'</div><div class="rs-l">'+s.l+'</div>';
    rs.appendChild(d);
  });

  // Quest cards
  var q=document.getElementById('room-q');q.innerHTML='';
  if(rc.length===0){q.innerHTML='<div style="width:100%;text-align:center;padding:40px;font-size:6px;color:#6B4226">Nenhuma missão ativa. O vilarejo está em paz... ⚔️</div>';
  }else{rc.forEach(function(c){
    var si=LOCS.findIndex(function(l){return l.id===c.st;});var nx=LOCS[si+1];
    var pc=c.pri==='urgent'?'urgent':c.pri==='high'?'high':'medium';
    var pl=c.pri==='urgent'?'⚠️ URGENTE':c.pri==='high'?'🔴 ALTA':'🟡 MÉDIA';
    var dc=c.days>=5?'risk':c.days>=3?'warn':'ok';
    var dt=c.days>0?'⏱️ '+c.days+'d nesta fase'+(c.days>=5?' — EM RISCO!':''):'';
    var d=document.createElement('div');d.className='qc '+pc;
    var checksHTML='';
    if(c.checks&&c.checks.length>0){
      checksHTML='<div class="qc-checks">';
      c.checks.forEach(function(ck,ci){
        checksHTML+='<div class="qc-ck'+(ck.d?' done':'')+'" onclick="toggleCheck(\''+c.id+'\','+ci+')"><div class="box">'+(ck.d?'✓':'')+'</div>'+ck.t+'</div>';
      });
      checksHTML+='</div>';
    }
    d.innerHTML=
      '<div class="qc-h"><div class="qc-name">'+c.co+'</div><div class="qc-pri '+pc+'">'+pl+'</div></div>'+
      '<div class="qc-info"><span>👤 '+c.who+'</span><span class="qc-val">R$'+c.val.toLocaleString('pt-BR')+' 🪙</span></div>'+
      (dt?'<div class="qc-days '+dc+'">'+dt+'</div>':'')+
      checksHTML+
      (nx&&c.st!=='concluido'?'<button class="qc-adv" onclick="advance(\''+c.id+'\')">▶ Avançar para '+nx.icon+' '+nx.nm+'</button>':'')+
      (c.st==='concluido'?'<div class="qc-done">🏆 MISSÃO COMPLETA!</div>':'');
    q.appendChild(d);
  });}

  // Room particles
  var rp=document.getElementById('room-pts');rp.innerHTML='';
  for(var i=0;i<12;i++){var p=document.createElement('div');p.className='pt';p.style.left=Math.random()*100+'%';p.style.setProperty('--del',Math.random()*5+'s');p.style.setProperty('--dur',(3+Math.random()*4)+'s');p.style.background=['#DAA520','#f59e0b'][i%2];p.style.width='2px';p.style.height='2px';rp.appendChild(p);}

  document.getElementById('room').classList.add('open');
  document.getElementById('hub').classList.add('out');
  document.getElementById('sys').textContent='🚪 '+loc.title+' — '+rc.length+' missão(ões)';
  renderNav();
}

// ═══ EXIT ═══
function exitRoom(){curRoom=null;document.getElementById('room').classList.remove('open');document.getElementById('hub').classList.remove('out');document.getElementById('sys').textContent='⚔️ Vilarejo de Lince';renderHub();renderNav();}

// ═══ TOGGLE CHECK ═══
window.toggleCheck=function(cid,ci){
  var c=clients.find(function(x){return x.id===cid;});
  if(!c||!c.checks[ci])return;
  c.checks[ci].d=!c.checks[ci].d;
  playSound('click');
  if(c.checks[ci].d){addXP(30);showNotif('✅ Sub-quest completa: '+c.checks[ci].t+' (+30 XP)');}
  enterRoom(curRoom);
};

// ═══ ADVANCE ═══
window.advance=function(cid){
  var c=clients.find(function(x){return x.id===cid;});
  if(!c)return;
  var si=LOCS.findIndex(function(l){return l.id===c.st;});
  if(si<0||si>=LOCS.length-1)return;
  var nx=LOCS[si+1];
  c.st=nx.id;c.days=0;
  playSound('advance');
  addXP(150);
  showNotif('⚔️ '+c.co+' → '+nx.icon+' '+nx.nm+' (+150 XP)');
  showXPPopup('+150 XP');
  if(nx.id==='concluido'){playSound('complete');setTimeout(function(){showAchievement('🏆','Missão Completa!',c.co+' gravado no Monumento da Vitória');},500);}
  enterRoom(curRoom);updHUD();renderHeroes();
};

// ═══ XP SYSTEM ═══
function addXP(amt){
  guildXP+=amt;
  var newLv=Math.floor(guildXP/500)+1;
  if(newLv>guildLv){guildLv=newLv;playSound('levelup');showLevelUp(newLv);}
  updHUD();
}
function showXPPopup(text){
  var d=document.createElement('div');d.className='xp-pop';d.textContent=text;
  d.style.left=Math.random()*40+30+'%';d.style.top=Math.random()*20+40+'%';
  document.body.appendChild(d);setTimeout(function(){d.remove();},1500);
}
function showLevelUp(lv){
  document.getElementById('lvl-text').textContent='NÍVEL '+lv+'!';
  document.getElementById('lvl-sub').textContent='A Guilda de Lince ficou mais forte!';
  document.getElementById('levelup').classList.add('show');
  setTimeout(function(){document.getElementById('levelup').classList.remove('show');},2500);
}

// ═══ ACHIEVEMENT ═══
function showAchievement(icon,title,desc){
  var d=document.createElement('div');d.className='ach-toast';
  d.innerHTML='<div class="ach-icon">'+icon+'</div><div><div class="ach-text">'+title+'</div><div class="ach-desc">'+desc+'</div></div>';
  document.body.appendChild(d);setTimeout(function(){d.remove();},4000);
}

// ═══ NOTIFICATION ═══
function showNotif(msg){var e=document.getElementById('notif');e.textContent=msg;e.classList.add('show');setTimeout(function(){e.classList.remove('show');},3000);}

window.addEventListener('DOMContentLoaded',init);
